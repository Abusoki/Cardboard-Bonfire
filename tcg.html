<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTG Companion</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Theme CSS variables (add new themes in css/themes.css) -->
    <link rel="stylesheet" href="./css/themes.css">

    <style>
        /* Theme CSS variables live in css/themes.css */

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-light);
        }

        /* Theme-aware utility classes */
        .theme-bg-primary {
            background: var(--bg-primary) !important;
        }

        .theme-bg-secondary {
            background: var(--bg-secondary) !important;
        }

        .theme-bg-card {
            background: var(--bg-card) !important;
        }

        .theme-bg-elevated {
            background: var(--bg-elevated) !important;
        }

        .theme-accent {
            background: var(--accent) !important;
        }

        .theme-accent-light {
            background: var(--accent-light) !important;
        }

        .theme-text {
            color: var(--text-primary) !important;
        }

        .theme-text-muted {
            color: var(--text-muted) !important;
        }

        .theme-text-accent {
            color: var(--accent) !important;
        }

        .theme-border {
            border-color: var(--border) !important;
        }

        .theme-border-light {
            border-color: var(--border-light) !important;
        }

        .theme-ring {
            --tw-ring-color: var(--accent-ring) !important;
        }

        /* Nav item active state */
        .nav-active {
            background: var(--accent) !important;
            color: #fff !important;
        }

        .nav-item:hover:not(.nav-active) {
            background: var(--bg-card) !important;
            color: var(--text-primary) !important;
        }

        /* Rotation Classes */
        .rotate-0 {
            transform: rotate(0deg);
        }

        .rotate-90 {
            transform: rotate(90deg);
        }

        .rotate-180 {
            transform: rotate(180deg);
        }

        .rotate-270 {
            transform: rotate(270deg);
        }

        /* Animation for Spin */
        @keyframes spin-slow {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .animate-spin-slow {
            animation: spin-slow 2s linear infinite;
        }

        @keyframes pulse-gold {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(234, 179, 8, 0.5);
                border-color: rgba(234, 179, 8, 0.8);
            }

            50% {
                box-shadow: 0 0 30px rgba(234, 179, 8, 0.8);
                border-color: rgba(234, 179, 8, 1);
            }
        }

        .winner-glow {
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-warning {

            0%,
            100% {
                box-shadow: 0 0 6px rgba(251, 191, 36, 0.6);
            }

            50% {
                box-shadow: 0 0 14px rgba(251, 191, 36, 0.9);
            }
        }

        .cmd-warning {
            animation: pulse-warning 1.2s infinite;
        }

        @keyframes pulse-lethal {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(239, 68, 68, 0.7);
            }

            50% {
                box-shadow: 0 0 18px rgba(239, 68, 68, 1);
            }
        }

        .cmd-lethal {
            animation: pulse-lethal 0.7s infinite;
        }

        /* Mobile Scrolling Fixes */
        .scroll-container {
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        /* Life graph */
        .life-graph-dot {
            transition: r 0.15s;
        }

        .life-graph-dot:hover {
            r: 5;
        }

        /* Settings theme swatch */
        .theme-swatch {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-swatch:hover {
            transform: scale(1.04);
        }

        .theme-swatch.selected {
            box-shadow: 0 0 0 3px var(--accent), 0 0 0 6px var(--accent-ring);
            transform: scale(1.04);
        }
    </style>
</head>

<body class="bg-[var(--bg-primary)] text-[var(--text-primary)] h-[100dvh] overflow-hidden">
    <div id="root" class="h-full w-full"></div>

    <!-- Icons + MTG colour identities -->
    <script type="text/babel" src="./js/icons.js"></script>

    <!-- Theme config + ThemeContext + ThemeProvider -->
    <script type="text/babel" src="./js/themes.js"></script>

    <!-- Firebase helper functions -->
    <script type="text/babel" src="./js/firebase-helpers.js"></script>

    <!-- Page components -->
    <script type="text/babel" src="./js/StatsPage.js"></script>
    <script type="text/babel" src="./js/ProfilePage.js"></script>

    <!-- PlayerCard component -->
    <script type="text/babel" src="./js/PlayerCard.js"></script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-analytics.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, arrayUnion, setDoc, getDoc, increment, serverTimestamp, deleteDoc, runTransaction, writeBatch, deleteField, arrayRemove, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const { useState, useEffect, useRef, useMemo } = React;

        // --- Configuration & Global Variables ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyA_mz_fVsph8VHfCEG__9sWg_ZvwYX5_6E",
            authDomain: "mtg-life-tool.firebaseapp.com",
            projectId: "mtg-life-tool",
            storageBucket: "mtg-life-tool.appspot.com",
            messagingSenderId: "36730058988",
            appId: "1:36730058988:web:757e2d9620593b4f65022a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Expose Firebase instances + functions for external modules
        window._db = db;
        window._appId = appId;
        window._fb = () => ({ doc, setDoc, getDoc, increment, serverTimestamp, writeBatch, arrayUnion, arrayRemove, collection, onSnapshot, addDoc, updateDoc, deleteDoc, runTransaction, deleteField, query, orderBy, limit });
        window._auth = auth;
        window._authFns = { signOut };

        // --- Icons (defined in js/icons.js) ---
        const Icon = window.Icon;
        const Icons = window.Icons;

        // --- Helpers (defined in js/firebase-helpers.js) ---
        const { updateCommanderStat, recordDeathStats, formatTime, getUserProfile, updateUserProfile, incrementUserStats, followUser, unfollowUser } = window.fbHelpers;


        // --- MTG Color Identities (defined in js/icons.js) ---
        const MTG_IDENTITIES = window.MTG_IDENTITIES;
        const IdentityIcon = window.IdentityIcon;

        // --- Theme Context (defined in js/themes.js, loaded before this module) ---
        const ThemeContext = window.ThemeContext;
        const ThemeProvider = window.ThemeProvider;

        // --- Web Worker Heartbeat Hook ---
        const useBackgroundHeartbeat = () => {
            useEffect(() => {
                const workerScript = `
                    let intervalId;
                    self.onmessage = function(e) {
                        if (e.data === 'start') {
                            intervalId = setInterval(() => {
                                self.postMessage('tick');
                            }, 1000);
                        } else if (e.data === 'stop') {
                            clearInterval(intervalId);
                        }
                    };
                `;
                const blob = new Blob([workerScript], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(blob);
                const worker = new Worker(workerUrl);
                worker.onmessage = () => { };
                worker.postMessage('start');
                return () => {
                    worker.postMessage('stop');
                    worker.terminate();
                    URL.revokeObjectURL(workerUrl);
                };
            }, []);
        };

        // --- Game Timer Hook ---
        const useGameTimer = () => {
            const [elapsed, setElapsed] = useState(0);
            const [isRunning, setIsRunning] = useState(false);
            const intervalRef = useRef(null);
            const startTimeRef = useRef(null);
            const accumulatedRef = useRef(0);

            const start = () => {
                if (isRunning) return;
                startTimeRef.current = Date.now();
                setIsRunning(true);
            };
            const pause = () => {
                if (!isRunning) return;
                accumulatedRef.current += Date.now() - startTimeRef.current;
                setIsRunning(false);
            };
            const reset = () => {
                accumulatedRef.current = 0;
                startTimeRef.current = null;
                setIsRunning(false);
                setElapsed(0);
            };
            const restart = () => {
                accumulatedRef.current = 0;
                startTimeRef.current = Date.now();
                setElapsed(0);
                setIsRunning(true);
            };
            useEffect(() => {
                if (!isRunning) { clearInterval(intervalRef.current); return; }
                intervalRef.current = setInterval(() => {
                    setElapsed(accumulatedRef.current + (Date.now() - startTimeRef.current));
                }, 500);
                return () => clearInterval(intervalRef.current);
            }, [isRunning]);

            return { elapsed, isRunning, display: formatTime(elapsed), start, pause, reset, restart };
        };

        // --- Life History Modal ---
        const LifeHistoryModal = ({ name, history, startLife = 40, onClose }) => {
            if (!history || history.length === 0) return (
                <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 backdrop-blur-md" onClick={onClose}>
                    <div className="bg-[var(--bg-secondary)] p-8 rounded-2xl border border-[var(--border)] text-center shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="text-[var(--text-muted)] mb-4">No life history yet.</div>
                        <button onClick={onClose} className="text-[var(--text-muted)] hover:text-[var(--text-primary)] transition-colors">Close</button>
                    </div>
                </div>
            );

            const W = 320, H = 180, PAD = 32;
            const allLife = [startLife, ...history.map(h => h.life)];
            const minL = Math.min(...allLife) - 5;
            const maxL = Math.max(...allLife) + 5;
            const toX = (i) => PAD + (i / (allLife.length - 1 || 1)) * (W - PAD * 2);
            const toY = (l) => PAD + ((maxL - l) / (maxL - minL || 1)) * (H - PAD * 2);
            const points = allLife.map((l, i) => `${toX(i)},${toY(l)}`).join(' ');
            const areaPoints = `${toX(0)},${H - PAD} ${points} ${toX(allLife.length - 1)},${H - PAD}`;
            const lastLife = allLife[allLife.length - 1];
            const colorClass = lastLife <= 0 ? '#ef4444' : lastLife <= 10 ? '#f59e0b' : '#a855f7';

            return (
                <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in" onClick={onClose}>
                    <div className="bg-[var(--bg-secondary)] w-full max-w-sm rounded-2xl border border-[var(--border)] shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-[var(--border)] flex justify-between items-center bg-[var(--bg-card)]">
                            <h3 className="font-bold text-[var(--text-primary)] flex items-center gap-2">
                                <Icons.BarChart2 className="w-4 h-4 text-[var(--accent)]" /> {name} — Life History
                            </h3>
                            <button onClick={onClose}><Icons.X className="w-5 h-5 text-[var(--text-muted)] hover:text-[var(--text-primary)] transition-colors" /></button>
                        </div>
                        <div className="p-4">
                            <svg viewBox={`0 0 ${W} ${H}`} width="100%" className="overflow-visible">
                                {/* Grid lines */}
                                {[0, 1, 2, 3].map(i => {
                                    const y = PAD + i * (H - PAD * 2) / 3;
                                    const val = Math.round(maxL - i * (maxL - minL) / 3);
                                    return <g key={i}>
                                        <line x1={PAD} y1={y} x2={W - PAD} y2={y} stroke="var(--border)" strokeDasharray="4,4" strokeWidth="1" />
                                        <text x={PAD - 4} y={y + 4} textAnchor="end" fill="var(--text-muted)" fontSize="9">{val}</text>
                                    </g>;
                                })}
                                {/* Zero line */}
                                {minL < 0 && maxL > 0 && <line x1={PAD} x2={W - PAD} y1={toY(0)} y2={toY(0)} stroke="#ef4444" strokeOpacity="0.4" strokeWidth="1" strokeDasharray="4,2" />}
                                {/* Area fill */}
                                <polygon points={areaPoints} fill={colorClass} fillOpacity="0.08" />
                                {/* Line */}
                                <polyline points={points} fill="none" stroke={colorClass} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
                                {/* Dots */}
                                {allLife.map((l, i) => (
                                    <circle key={i} cx={toX(i)} cy={toY(l)} r="3.5" fill={colorClass} stroke="var(--bg-secondary)" strokeWidth="2" className="life-graph-dot">
                                        <title>{i === 0 ? `Start: ${l}` : `Move ${i}: ${l}`}</title>
                                    </circle>
                                ))}
                            </svg>
                            <div className="flex justify-between text-xs text-[var(--text-faint)] mt-1 px-1">
                                <span>Start ({startLife})</span>
                                <span>Now ({lastLife})</span>
                            </div>
                            {history.length > 0 && (
                                <div className="mt-3 space-y-1 max-h-28 overflow-y-auto scroll-container">
                                    {[...history].reverse().slice(0, 10).map((h, i) => (
                                        <div key={i} className="flex justify-between text-xs text-[var(--text-muted)] border-b border-[var(--border-light)] pb-1">
                                            <span>{h.change > 0 ? `+${h.change}` : h.change}</span>
                                            <span className="font-bold text-[var(--text-primary)]">{h.life}</span>
                                            <span className="text-[var(--text-faint)]">{new Date(h.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        <div className="p-3 bg-[var(--bg-card)] border-t border-[var(--border)] flex justify-center">
                            <button onClick={onClose} className="text-[var(--text-muted)] hover:text-[var(--text-primary)] text-sm transition-colors">Close</button>
                        </div>
                    </div>
                </div>
            );
        };


        // helper for canvas roundRect (Safari compat)
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
        }

        // --- Settings Page ---
        const SettingsPage = () => {
            const { theme, setTheme } = React.useContext(ThemeContext);
            // Theme list is defined in js/themes.js — add new themes there
            const themes = window.THEME_CONFIG;
            return (
                <div className="absolute inset-0 p-8 overflow-y-auto scroll-container pb-24" style={{ background: 'var(--bg-primary)', color: 'var(--text-primary)' }}>
                    <div className="max-w-2xl mx-auto space-y-8">
                        <h1 className="text-3xl font-bold flex items-center gap-3" style={{ color: 'var(--text-primary)' }}>
                            <Icons.Sliders className="w-8 h-8" style={{ color: 'var(--accent)' }} /> Settings
                        </h1>

                        {/* Theme picker */}
                        <div className="p-6 rounded-2xl border" style={{ background: 'var(--bg-secondary)', borderColor: 'var(--border-light)' }}>
                            <h2 className="text-xl font-bold mb-1" style={{ color: 'var(--text-primary)' }}>Theme</h2>
                            <p className="text-sm mb-6" style={{ color: 'var(--text-muted)' }}>Changes take effect immediately and are saved for next time.</p>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                {themes.map(t => (
                                    <button
                                        key={t.id}
                                        onClick={() => setTheme(t.id)}
                                        className={`theme-swatch p-4 rounded-xl border-2 text-left transition-all ${theme === t.id ? 'selected' : ''}`}
                                        style={{ background: t.preview[0], borderColor: theme === t.id ? t.preview[1] : t.preview[2] }}
                                    >
                                        <div className="flex gap-2 mb-3">
                                            <div className="w-5 h-5 rounded-full" style={{ background: t.preview[0], border: `2px solid ${t.preview[2]}` }} />
                                            <div className="w-5 h-5 rounded-full" style={{ background: t.preview[1] }} />
                                            <div className="w-5 h-5 rounded-full" style={{ background: t.preview[2] }} />
                                        </div>
                                        <div className="font-bold text-sm" style={{ color: t.id === 'light' ? '#0f172a' : '#f1f5f9' }}>{t.label}</div>
                                        <div className="text-xs mt-0.5" style={{ color: t.id === 'light' ? '#64748b' : '#94a3b8' }}>{t.desc}</div>
                                        {theme === t.id && (
                                            <div className="mt-2 text-xs font-bold px-2 py-0.5 rounded-full inline-block" style={{ background: t.preview[1], color: '#fff' }}>Active</div>
                                        )}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Preferences (future) */}
                        <div className="p-6 rounded-2xl border" style={{ background: 'var(--bg-secondary)', borderColor: 'var(--border-light)' }}>
                            <h2 className="text-xl font-bold mb-4" style={{ color: 'var(--text-primary)' }}>Preferences</h2>
                            <div className="space-y-3 opacity-50 pointer-events-none select-none">
                                {['Starting Life Total (40)', 'Auto-detect Winner', 'Sound Effects', 'Haptic Feedback'].map(pref => (
                                    <div key={pref} className="flex items-center justify-between p-3 rounded-lg" style={{ background: 'var(--bg-card)' }}>
                                        <span className="text-sm" style={{ color: 'var(--text-muted)' }}>{pref}</span>
                                        <div className="w-10 h-5 rounded-full" style={{ background: 'var(--bg-elevated)' }} />
                                    </div>
                                ))}
                                <p className="text-xs text-center pt-2" style={{ color: 'var(--text-faint)' }}>Coming soon</p>
                            </div>
                        </div>

                        {/* About */}
                        <div className="p-6 rounded-2xl border" style={{ background: 'var(--bg-secondary)', borderColor: 'var(--border-light)' }}>
                            <h2 className="text-xl font-bold mb-2" style={{ color: 'var(--text-primary)' }}>About</h2>
                            <p className="text-sm" style={{ color: 'var(--text-muted)' }}>MTG Commander Companion — v2.28.0</p>
                            <p className="text-xs mt-1" style={{ color: 'var(--text-faint)' }}>Not affiliated with Wizards of the Coast.</p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Components ---

        // 1. Game Tools Modal (Unchanged)
        const GameToolsModal = ({ players, onClose }) => {
            const [activeTab, setActiveTab] = useState('first');
            const [result, setResult] = useState(null);
            const [animating, setAnimating] = useState(false);

            const spinForFirst = () => {
                setAnimating(true);
                setResult(null);
                let count = 0;
                const max = 20;
                const interval = setInterval(() => {
                    setResult(players[count % players.length].name);
                    count++;
                    if (count > max) {
                        clearInterval(interval);
                        const winner = players[Math.floor(Math.random() * players.length)];
                        setResult(winner.name);
                        setAnimating(false);
                    }
                }, 100);
            };

            const rollDice = (sides) => {
                setAnimating(true);
                setResult(null);
                setTimeout(() => {
                    setResult(Math.floor(Math.random() * sides) + 1);
                    setAnimating(false);
                }, 600);
            };

            const flipCoin = () => {
                setAnimating(true);
                setResult(null);
                setTimeout(() => {
                    setResult(Math.random() > 0.5 ? "Heads" : "Tails");
                    setAnimating(false);
                }, 600);
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in" onClick={onClose}>
                    <div className="bg-[var(--bg-secondary)] w-full max-w-sm rounded-2xl border border-[var(--border)] shadow-2xl overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
                        <div className="flex border-b border-[var(--border)]">
                            {['first', 'dice', 'coin'].map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => { setActiveTab(tab); setResult(null); }}
                                    className={`flex-1 p-3 text-sm font-bold capitalize transition-colors ${activeTab === tab ? 'bg-[var(--accent)] text-white shadow-inner shadow-black/20' : 'bg-[var(--bg-card)] text-[var(--text-muted)] hover:bg-[var(--bg-elevated)]'}`}
                                >
                                    {tab === 'first' ? 'Who First?' : tab}
                                </button>
                            ))}
                        </div>

                        <div className="p-8 flex flex-col items-center justify-center min-h-[200px]">
                            {activeTab === 'first' && (
                                <>
                                    <div className={`text-3xl font-bold mb-6 text-center break-words w-full ${animating ? 'text-[var(--text-muted)]' : 'text-[var(--text-primary)]'}`}>
                                        {result || "?"}
                                    </div>
                                    <button onClick={spinForFirst} disabled={animating} className="bg-[var(--bg-elevated)] hover:bg-[var(--bg-card)] text-[var(--text-primary)] px-6 py-2 rounded-full font-bold border border-[var(--border)] transition-all">
                                        Spin Randomizer
                                    </button>
                                </>
                            )}
                            {activeTab === 'dice' && (
                                <>
                                    <div className={`text-6xl font-black mb-8 ${animating ? 'animate-bounce text-[var(--text-muted)]' : 'theme-accent-text'}`}>
                                        {result || <Icons.Dices className="w-16 h-16 opacity-20" />}
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => rollDice(6)} disabled={animating} className="bg-[var(--bg-elevated)] hover:bg-[var(--bg-card)] text-[var(--text-primary)] px-4 py-2 rounded-lg font-bold border border-[var(--border)] transition-all">Roll D6</button>
                                        <button onClick={() => rollDice(20)} disabled={animating} className="bg-[var(--accent)] hover:bg-[var(--accent-hover)] text-white px-4 py-2 rounded-lg font-bold shadow-lg shadow-purple-900/10 transition-all">Roll D20</button>
                                    </div>
                                </>
                            )}
                            {activeTab === 'coin' && (
                                <>
                                    <div className={`text-4xl font-bold mb-8 ${animating ? 'animate-spin-slow text-[var(--text-faint)]' : 'text-yellow-400'}`}>

        const UsernameSetup = ({ user, onComplete }) => {
            const [username, setUsername] = useState('');
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError(null);
                setLoading(true);

                const cleanName = username.trim();
                const cleanId = cleanName.toLowerCase();

                if (cleanName.length < 3) {
                    setError("Username must be at least 3 characters.");
                    setLoading(false);
                    return;
                }

                try {
                    await runTransaction(db, async (transaction) => {
                        const usernameRef = doc(db, 'artifacts', appId, 'public', 'data', 'usernames', cleanId);
                        const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);

                        const usernameDoc = await transaction.get(usernameRef);
                        if (usernameDoc.exists()) {
                            throw "Username is already taken.";
                        }

                        transaction.set(usernameRef, { uid: user.uid });
                        transaction.set(userRef, { displayName: cleanName, updatedAt: serverTimestamp() }, { merge: true });
                    });

                    // Update Auth Profile for consistency
                    if (auth.currentUser) {
                        // We can't actually import updateProfile here easily as it wasn't in original import list fully correctly?
                        // Wait, I added it in previous step.
                        await updateProfile(auth.currentUser, { displayName: cleanName });

                    setError(typeof e === 'string' ? e : "Error setting username. Try again.");

                    setLoading(false);

        const CardSearch = ({ onSelect, onClose, mode = 'commander', allowPartner = true }) => {

            const [loading, setLoading] = useState(false);

            const debounceRef = useRef(null);

            const searchScryfall = async (q) => {
                if (!q || q.length < 3) {
                    setResults([]);
                    return;
                }
                setLoading(true);
                try {
                    let searchParams = `q=${encodeURIComponent(q + ' (game:paper)')}`;
                    if (mode === 'commander') {
                        searchParams = `q=${encodeURIComponent(q + ' (is:commander) (game:paper)')}`;
                    }

                    const response = await fetch(`https://api.scryfall.com/cards/search?${searchParams}`);
                    const data = await response.json();
                    if (data.data) {
                        setResults(data.data.slice(0, 20));
                    } else {
                        setResults([]);
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    setLoading(false);
                }
            };

            const handleInput = (e) => {

                setQuery(val);

            useEffect(() => {
                const generate = async () => {
                    setGenerating(true);
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');

                    // Background Gradient
                    const grad = ctx.createLinearGradient(0, 0, 800, 600);
                    grad.addColorStop(0, '#1e1b4b');
                    grad.addColorStop(1, '#020617');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 800, 600);

                    // Decorative elements
                    ctx.strokeStyle = 'rgba(147, 51, 234, 0.15)';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 20; i++) {
                        ctx.beginPath();
                        ctx.arc(Math.random() * 800, Math.random() * 600, Math.random() * 80, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    // Header
                    ctx.fillStyle = '#9333ea';
                    ctx.font = '900 32px Inter, sans-serif';
                    ctx.fillText('MATCH SUMMARY', 50, 60);

                    ctx.fillStyle = '#64748b';
                    ctx.font = 'bold 16px Inter, sans-serif';
                    ctx.fillText(roomName.toUpperCase(), 50, 85);

                    // Winner Badge
                    if (winner) {
                        ctx.fillStyle = 'rgba(147, 51, 234, 0.2)';
                        if (ctx.roundRect) ctx.roundRect(50, 110, 700, 140, 20);
                        else ctx.fillRect(50, 110, 700, 140);
                        ctx.fill();

                        ctx.fillStyle = '#fbbf24';
                        ctx.font = '900 20px Inter, sans-serif';
                        ctx.fillText('🏆 WINNER', 80, 150);

                        ctx.fillStyle = '#ffffff';
                        ctx.font = '900 48px Inter, sans-serif';
                        ctx.fillText(winner.name, 80, 205);

                        if (winner.commander?.name) {
                            ctx.fillStyle = '#d8b4fe';
                            ctx.font = 'bold 20px Inter, sans-serif';
                            ctx.fillText(winner.commander.name, 80, 230);
                        }
                    }

                    // Players Section
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '900 24px Inter, sans-serif';
                    ctx.fillText('Final Standings', 50, 300);

                    players.slice(0, 5).forEach((p, i) => {
                        const y = 350 + (i * 50);
                        ctx.fillStyle = p.isDead ? 'rgba(255, 255, 255, 0.03)' : 'rgba(255, 255, 255, 0.08)';
                        if (ctx.roundRect) ctx.roundRect(50, y - 35, 700, 40, 10);
                        else ctx.fillRect(50, y - 35, 700, 40);
                        ctx.fill();

                        ctx.fillStyle = p.isDead ? '#475569' : '#f1f5f9';
                        ctx.font = 'bold 18px Inter, sans-serif';
                        ctx.fillText(p.name, 70, y - 8);

                        ctx.font = 'bold 16px Inter, sans-serif';
                        ctx.textAlign = 'right';
                        ctx.fillText(p.isDead ? 'ELIMINATED' : `${p.life} HP`, 730, y - 8);
                        ctx.textAlign = 'left';
                    });

                    // Footer
                    ctx.fillStyle = '#0f172a';
                    ctx.fillRect(0, 540, 800, 60);

                    ctx.fillStyle = '#a78bfa';
                    ctx.font = '900 14px Inter, sans-serif';
                    ctx.fillText('CARDBOARD BONFIRE • MTG COMPANION', 50, 575);

                    ctx.textAlign = 'right';
                    ctx.fillStyle = '#64748b';
                    ctx.font = 'bold 14px Inter, sans-serif';

                    link.href = previewUrl;
                    link.click();

                        </div>

                        <div className="p-10 flex flex-col items-center">
                            <canvas ref={canvasRef} width="800" height="600" className="hidden" />

                    const ctx = canvas.getContext('2d');

                    // BG
                    const grad = ctx.createLinearGradient(0, 0, 800, 600);
                    grad.addColorStop(0, '#2e1065');
                    grad.addColorStop(1, '#020617');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 800, 600);

                    // Header
                    ctx.fillStyle = '#a78bfa';
                    ctx.font = '900 40px Inter, sans-serif';
                    ctx.fillText((user?.displayName || 'PLAYER').toUpperCase(), 50, 80);
                    ctx.fillStyle = '#64748b';
                    ctx.font = 'bold 16px Inter, sans-serif';
                    ctx.fillText('CARDBOARD BONFIRE PRO-STATS', 50, 110);

                    // Stats Grid
                    const s = stats.deathStats || {};
                    const total = (s.standard || 0) + (s.commander || 0) + (s.poison || 0) + (s.milled || 0);

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                    if (ctx.roundRect) ctx.roundRect(50, 150, 700, 120, 20); else ctx.fillRect(50, 150, 700, 120);
                    ctx.fill();

                    ctx.fillStyle = '#ffffff';
                    ctx.font = '900 32px Inter, sans-serif';
                    ctx.fillText(total.toLocaleString(), 80, 210);
                    ctx.fillStyle = '#94a3b8';
                    ctx.font = 'bold 14px Inter, sans-serif';
                    ctx.fillText('GLOBAL DEATHS RECORDED', 80, 235);

                    // Top Commander
                    if (stats.topCommander) {
                        ctx.fillStyle = 'rgba(147, 51, 234, 0.2)';
                        if (ctx.roundRect) ctx.roundRect(50, 290, 700, 230, 20); else ctx.fillRect(50, 290, 700, 230);
                        ctx.fill();

                        ctx.fillStyle = '#fbbf24';
                        ctx.font = '900 14px Inter, sans-serif';
                        ctx.fillText('SIGNATURE COMMANDER', 80, 330);

                        ctx.fillStyle = '#ffffff';
                        ctx.font = '900 48px Inter, sans-serif';
                        ctx.fillText(stats.topCommander.name, 80, 390);

                        ctx.fillStyle = '#d8b4fe';
                        ctx.font = 'bold 20px Inter, sans-serif';
                        ctx.fillText(`${stats.topCommander.count} Total Picks Across Games`, 80, 420);
                    }

                    ctx.fillStyle = '#0f172a';
                    ctx.fillRect(0, 540, 800, 60);
                    ctx.fillStyle = '#a78bfa';
                    ctx.font = 'bold 14px Inter, sans-serif';
                    ctx.fillText('CARDBOARD BONFIRE • MTG COMPANION', 50, 575);

                    setPreviewUrl(canvas.toDataURL('image/png'));
                    setGenerating(false);
                };
                generate();
            }, [user, stats]);

            const share = async () => {
                const blob = await (await fetch(previewUrl)).blob();
                const file = new File([blob], 'stats-card.png', { type: 'image/png' });
                if (navigator.share) {
                    try { await navigator.share({ files: [file], title: 'My MTG Stats', text: 'Check out my MTG Companion stats!' }); }
                    catch (e) { const link = document.createElement('a'); link.download = 'my-stats.png'; link.href = previewUrl; link.click(); }
                } else {
                    const link = document.createElement('a'); link.download = 'my-stats.png'; link.href = previewUrl; link.click();
                }
            };

            return (

                            <img src={previewUrl} className="w-full h-auto rounded-3xl shadow-2xl border border-[var(--border)]" alt="Stats Card" />
                            <div className="grid grid-cols-2 gap-4 w-full mt-10">
                                <button onClick={onClose} className="py-4 rounded-2xl bg-[var(--bg-elevated)] text-[var(--text-muted)] font-bold uppercase tracking-widest text-xs">Close</button>
                                <button onClick={share} className="py-4 rounded-2xl bg-[var(--accent)] text-white font-bold uppercase tracking-widest text-xs shadow-lg shadow-purple-500/20 flex items-center justify-center gap-2">
                                    <Icons.Share className="w-4 h-4" /> Export
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 5. Stats Page
        // StatsPage (defined in js/StatsPage.js)
        const StatsPage = window.StatsPage;
        // 6. PlayerCard is loaded from js/PlayerCard.js via window.PlayerCard
        const PlayerCard = window.PlayerCard;


        // 7. Contact Page (Unchanged)
        const ContactPage = () => (
            <div className="absolute inset-0 flex flex-col items-center justify-center p-8 text-center animate-in fade-in duration-500 scroll-container overflow-y-auto pb-24">
                <div className="bg-[var(--bg-secondary)]/50 backdrop-blur-lg p-8 rounded-2xl border border-[var(--border)] shadow-2xl max-w-md w-full">
                    <div className="w-16 h-16 bg-purple-600/20 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Mail className="w-8 h-8 text-purple-500" /></div>
                    <h1 className="text-3xl font-bold text-white mb-2">Get in Touch</h1>
                    <p className="text-[var(--text-muted)] mb-8">Have feedback or feature requests? We'd love to hear from you.</p>
                    <a href="mailto:CardboardBonFire@gmail.com" className="block w-full bg-[var(--bg-elevated)] hover:bg-[var(--bg-card)] border border-[var(--border)] text-[var(--text-primary)] font-medium py-4 px-6 rounded-xl transition-all hover:border-[var(--accent)] group"><span className="text-xs text-[var(--text-faint)] uppercase tracking-wider block mb-1 group-hover:text-[var(--accent)]">Email Us At</span><span className="text-lg break-all">CardboardBonFire@gmail.com</span></a>
                </div>
            </div>
        );

        // 8. Profile Page
        // ProfilePage (defined in js/ProfilePage.js)
        const ProfilePage = window.ProfilePage;
        // 8. Online Room (Refactored for Stability)
        const OnlineRoom = ({ user, onLeave }) => {
            const [joinedRoom, setJoinedRoom] = useState(null);
            const [error, setError] = useState('');
            const [players, setPlayers] = useState([]);
            const [roomData, setRoomData] = useState(null);
            const [showCopiedToast, setShowCopiedToast] = useState(false);
            const [showCardSearch, setShowCardSearch] = useState(false);
            const [viewingCard, setViewingCard] = useState(null);

            const [confirmReset, setConfirmReset] = useState(false);
            const [confirmClose, setConfirmClose] = useState(false);

            const [showChat, setShowChat] = useState(false);
            const [chatInput, setChatInput] = useState('');
            const [messages, setMessages] = useState([]);
            const [unreadCount, setUnreadCount] = useState(0);
            const lastMsgCountRef = useRef(0);
            const chatEndRef = useRef(null);

            // --- FIX 3: Ref to hold latest player state for Heartbeat closure ---
            const playersRef = useRef([]);

            // --- FIX 4: Ref to prevent "Click Twice" race condition ---
            const isJoiningRef = useRef(false);
            const lastWinnerRef = useRef(null); // Track processed winner to avoid duplicate stats
            const [showToolsModal, setShowToolsModal] = useState(false);
            const [showHistoryModal, setShowHistoryModal] = useState(false);
            const [roomLog, setRoomLog] = useState([]);
            const [showMatchResult, setShowMatchResult] = useState(false);
            const [displayTimer, setDisplayTimer] = useState("00:00:00");

            const [rooms, setRooms] = useState([]);
            const [playerName, setPlayerName] = useState('');
            const [hostName, setHostName] = useState('');
            const [hostPassword, setHostPassword] = useState('');
            const [joinPassword, setJoinPassword] = useState('');
            const [selectedRoomId, setSelectedRoomId] = useState(null);



            const TIMEOUT_INACTIVITY = 20 * 60 * 1000;
            const TIMEOUT_DURATION = 12 * 60 * 60 * 1000;

            useEffect(() => { const storedName = localStorage.getItem('mtg_username'); if (storedName) setPlayerName(storedName); }, []);
            const updatePlayerName = (name) => { setPlayerName(name); localStorage.setItem('mtg_username', name); };
            const getMillis = (ts) => { if (!ts) return Date.now(); return ts.toMillis ? ts.toMillis() : Date.now(); };

            // Wake Lock
            useEffect(() => {
                let wakeLock = null;
                const requestWakeLock = async () => {
                    try {
                        if ('wakeLock' in navigator) {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    } catch (err) {
                        console.log(`${err.name}, ${err.message}`);
                    }
                };
                if (joinedRoom) {
                    requestWakeLock();
                    document.addEventListener('visibilitychange', handleVisibilityChange);
                }
                async function handleVisibilityChange() {
                    if (wakeLock !== null && document.visibilityState === 'visible') {
                        requestWakeLock();
                    }
                }
                return () => {
                    if (wakeLock !== null) {
                        wakeLock.release();
                        wakeLock = null;
                    }
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                };
            }, [joinedRoom]);

            // Room List
            useEffect(() => {
                if (joinedRoom) return;
                const params = new URLSearchParams(window.location.search);
                const roomParam = params.get('room');
                if (roomParam) setSelectedRoomId(roomParam);

                const roomsRef = collection(db, 'artifacts', appId, 'public', 'data', 'rooms');
                const unsub = onSnapshot(roomsRef, (snap) => {
                    const r = [];
                    const now = Date.now();
                    snap.forEach(d => {
                        const data = d.data();
                        const created = getMillis(data.createdAt);
                        const lastActive = getMillis(data.lastActivity);
                        if (now - lastActive < TIMEOUT_INACTIVITY && now - created < TIMEOUT_DURATION) {
                            // Adjust for Map or Array
                            const pCount = Array.isArray(data.players) ? data.players.length : Object.keys(data.players || {}).length;
                            r.push({ id: d.id, ...data, playerCount: pCount });
                        }
                    });
                    setRooms(r);
                });
                return () => unsub();
            }, [joinedRoom]);

            // --- FIX 1: Add Player Logic moved here ---
            const joinRoomLogic = async (roomName, password = null) => {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomName);

                try {
                    await runTransaction(db, async (transaction) => {
                        const roomDoc = await transaction.get(roomRef);
                        if (!roomDoc.exists()) { throw new Error("Room does not exist."); }

                        const data = roomDoc.data();
                        if (data.password && data.password !== password) { throw new Error("Incorrect Password"); }

                        let currentPlayers = data.players || {};
                        let isArray = Array.isArray(currentPlayers);

                        // Check presence
                        const existingPlayer = isArray
                            ? currentPlayers.find(p => p.id === user.uid)
                            : currentPlayers[user.uid];

                        if (!existingPlayer) {
                            const newPlayer = {
                                id: user.uid,
                                name: playerName || `Player ${Object.keys(currentPlayers).length + 1}`,
                                life: 40,
                                commander: null,
                                isDead: false,
                                poison: 0,
                                milled: false,
                                commanderDamage: {},
                                lastHeartbeat: Date.now(),
                                isGuest: user.isAnonymous
                            };

                            if (isArray) {
                                // MIGRATION: Convert Array to Map if we are the one joining and it's still an array
                                const map = {};
                                currentPlayers.forEach(p => map[p.id] = p);
                                map[user.uid] = newPlayer;
                                transaction.update(roomRef, {
                                    players: map,
                                    lastActivity: serverTimestamp()
                                });
                            } else {
                                // Atomic Update
                                transaction.update(roomRef, {
                                    [`players.${user.uid}`]: newPlayer,
                                    lastActivity: serverTimestamp()
                                });
                            }
                        }
                    });
                    // Mark as joining to prevent race condition kick
                    isJoiningRef.current = true;
                    setJoinedRoom(roomName);
                } catch (e) {
                    setError(e.message);
                    isJoiningRef.current = false;
                }
            };

            const createRoom = async () => {
                if (!hostName || !playerName) { setError("Room Name and Player Name are required."); return; }
                if (!user) { setError("Authenticating..."); return; }
                try {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', hostName);
                    const playerData = {
                        id: user.uid,
                        name: playerName,
                        life: 40,
                        commander: null,
                        partner: null,
                        isDead: false,
                        poison: 0,
                        commanderDamage: {},
                        milled: false,
                        lastActive: Date.now(),
                        lastHeartbeat: Date.now(),
                        isGuest: user.isAnonymous
                    };
                    await setDoc(roomRef, {
                        name: hostName,
                        password: hostPassword,
                        hostId: user.uid,
                        createdAt: serverTimestamp(),
                        lastActivity: serverTimestamp(),
                        players: { [user.uid]: playerData },
                        log: [],
                        messages: [],
                        timer: {
                            isRunning: false,
                            startTime: null,
                            offset: 0
                        }
                    });
                    if (playerData.commander && hostName !== "Test") updateCommanderStat(playerData.commander);
                    isJoiningRef.current = true;
                    setJoinedRoom(hostName);
                } catch (err) { setError(err.message); isJoiningRef.current = false; }
            };

            const joinRoom = () => {
                if (!selectedRoomId && !hostName) { setError("Select a room."); return; }
                const rName = selectedRoomId || hostName;
                if (!playerName) { setError("Enter Display Name."); return; }
                joinRoomLogic(rName, joinPassword);
            };

            const copyRoomLink = () => {
                const url = `${window.location.origin}${window.location.pathname}?room=${encodeURIComponent(joinedRoom)}`;
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setShowCopiedToast(true);
                setTimeout(() => setShowCopiedToast(false), 2000);
            };

            const closeRoom = async () => {
                if (!joinedRoom) return;
                await recordDeathStats(playersRef.current);
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', joinedRoom));
                    setJoinedRoom(null);
                    setConfirmClose(false);
                } catch (e) { setError(e.message); }
            };

            const resetGame = async () => {
                if (!joinedRoom) return;
                try {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', joinedRoom);
                    // Use standard batch update logic with dot notation
                    const updates = {};
                    playersRef.current.forEach(p => {
                        updates[`players.${p.id}.life`] = 40;
                        updates[`players.${p.id}.poison`] = 0;
                        updates[`players.${p.id}.milled`] = false;
                        updates[`players.${p.id}.commanderDamage`] = {};
                        updates[`players.${p.id}.isDead`] = false;
                    });
                    updates.messages = arrayUnion({ sender: "System", text: "Game has been reset.", timestamp: Date.now() });
                    updates.timer = { isRunning: false, offset: 0, startTime: null };

                    await updateDoc(roomRef, updates);
                    setConfirmReset(false);
                    lastWinnerRef.current = null; // Reset stat tracker
                } catch (e) { setError(e.message); }
            };

            const sendMessage = async (customText = null, cardData = null) => {
                const textToSend = customText || chatInput.trim();
                if (!textToSend) return;
                const msg = { sender: playerName, text: textToSend, timestamp: Date.now(), card: cardData };
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', joinedRoom);
                await updateDoc(roomRef, { messages: arrayUnion(msg) });
                if (!customText) setChatInput('');
            };

            const addLogEntry = async (entry) => {
                if (!joinedRoom) return;
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', joinedRoom);
                await updateDoc(roomRef, { log: arrayUnion({ timestamp: Date.now(), message: entry }) });
            };

            const handleLeaveRoom = async () => {
                if (!joinedRoom || !user) return;
                try {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', joinedRoom);
                    // Use ref to get latest state for leaving logic
                    const currentList = playersRef.current;
                    const remainingPlayers = currentList.filter(p => p.id !== user.uid);


                    // Atomic Leave
                    await updateDoc(roomRef, {
                        [`players.${user.uid}`]: deleteField()
                    });

                    // Check if room empty (this is best effort, strictly speaking we should use a transaction or cloud function to delete empty rooms, but this logic was client-side rely)
                    // We'll leave the room deletion to a separate cleanup or just let it exist empty until timeout.
                    // But to match previous logic:
                    if (remainingPlayers.length === 0) {
                        // We can try to delete it, but if we just left, we might not have permission if rules require being in it?
                        // Assuming open permissions for now as per previous code
                        await deleteDoc(roomRef);
                    }

                    setJoinedRoom(null);
                    onLeave();
                } catch (e) {
                    console.error("Error leaving room:", e);
                    setJoinedRoom(null);
                    onLeave();
                }
            };

            // NEW: Kick Player Function
            const handleKickPlayer = async (playerIdToKick) => {
                if (!joinedRoom || !isHost) return;
                try {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', joinedRoom);
                    await updateDoc(roomRef, {
                        [`players.${playerIdToKick}`]: deleteField(),
                        messages: arrayUnion({ sender: "System", text: "A player was kicked from the room.", timestamp: Date.now() })
                    });
                } catch (e) {
                    console.error("Error kicking player:", e);
                }
            };

            // Online Timer Functions
            const toggleOnlineTimer = async () => {
                if (!joinedRoom || !isHost) return;
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', joinedRoom);
                const timer = roomData?.timer || { isRunning: false, offset: 0, startTime: null };

                if (timer.isRunning) {
                    // Pause
                    const elapsed = Date.now() - (timer.startTime?.toMillis?.() || timer.startTime || Date.now());
                    await updateDoc(roomRef, {
                        'timer.isRunning': false,
                        'timer.offset': timer.offset + elapsed,
                        'timer.startTime': null
                    });
                } else {
                    // Start
                    await updateDoc(roomRef, {
                        'timer.isRunning': true,
                        'timer.startTime': serverTimestamp()
                    });
                }
            };

            const resetOnlineTimer = async () => {
                if (!joinedRoom || !isHost) return;
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', joinedRoom);
                await updateDoc(roomRef, {
                    'timer.isRunning': false,
                    'timer.offset': 0,
                    'timer.startTime': null
                });
            };

            useEffect(() => {
                if (!roomData?.timer) return;
                const { isRunning, startTime, offset } = roomData.timer;

                const update = () => {
                    if (!isRunning) {
                        setDisplayTimer(formatTime(offset));
                        return;
                    }
                    const start = startTime?.toMillis?.() || startTime || Date.now();
                    const elapsed = Date.now() - start + offset;
                    setDisplayTimer(formatTime(elapsed));
                };

                update();
                if (isRunning) {
                    const interval = setInterval(update, 1000);
                    return () => clearInterval(interval);
                }
            }, [roomData?.timer]);

            // --- FIX 1 (Cont): Listener ONLY listens ---
            const ChatMessage = ({ msg, isMyMsg, onViewCard }) => {
                const [showTooltip, setShowTooltip] = useState(false);

                // If message has card data, we render differently
                if (msg.card) {
                    const parts = msg.text.split(`[${msg.card.name}]`);
                    if (parts.length === 2) {
                        return (
                            <div className={`flex flex-col ${isMyMsg ? 'items-end' : 'items-start'}`}>
                                <div className="text-[10px] text-[var(--text-faint)] px-1 mb-0.5">{msg.sender}</div>
                                <div className={`px-3 py-2 rounded-lg text-sm max-w-[85%] break-words relative overflow-visible ${isMyMsg ? 'bg-[var(--accent)] text-white rounded-br-none shadow-lg shadow-purple-900/10' : 'bg-[var(--bg-elevated)] text-[var(--text-primary)] border border-[var(--border)] rounded-bl-none'}`}>
                                    <span>{parts[0]}</span>
                                    <span
                                        className="font-bold underline decoration-dotted cursor-pointer relative inline-block theme-accent-text hover:opacity-80"
                                        onMouseEnter={() => setShowTooltip(true)}
                                        onMouseLeave={() => setShowTooltip(false)}
                                        onClick={(e) => { e.stopPropagation(); setShowTooltip(false); onViewCard(msg.card); }}
                                    >
                                        {msg.card.name}
                                        {showTooltip && (
                                            <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-48 rounded-xl shadow-2xl border-2 border-[var(--border)] z-50 animate-in fade-in zoom-in-95 pointer-events-none bg-[var(--bg-secondary)] overflow-hidden">
                                                <img src={msg.card.image} alt={msg.card.name} className="w-full h-auto object-cover" />
                                            </div>
                                        )}
                                    </span>
                                    <span>{parts[1]}</span>
                                </div>
                            </div>
                        );
                    }
                }

                return (
                    <div className={`flex flex-col ${isMyMsg ? 'items-end' : 'items-start'}`}>
                        <div className="text-[10px] text-[var(--text-faint)] px-1 mb-0.5">{msg.sender}</div>
                        <div className={`px-3 py-2 rounded-lg text-sm max-w-[85%] break-words ${isMyMsg ? 'bg-[var(--accent)] text-white rounded-br-none shadow-lg shadow-purple-900/10' : 'bg-[var(--bg-elevated)] text-[var(--text-primary)] border border-[var(--border)] rounded-bl-none'}`}>
                            {msg.text}
                        </div>
                    </div>
                );
            };

            useEffect(() => {
                if (!joinedRoom || !user) return;
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', joinedRoom);
                const unsubscribe = onSnapshot(roomRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setRoomData(data);

                        // Timeout checks
                        const now = Date.now();
                        const created = getMillis(data.createdAt);
                        const lastActive = getMillis(data.lastActivity);
                        if (now - lastActive > TIMEOUT_INACTIVITY) { setJoinedRoom(null); setError("Room closed (inactivity)."); return; }
                        if (now - created > TIMEOUT_DURATION) { setJoinedRoom(null); setError("Room closed (12h limit)."); return; }

                        // Messages
                        const msgs = data.messages || [];
                        setMessages(msgs);
                        if (!showChat && msgs.length > lastMsgCountRef.current) { setUnreadCount(prev => prev + (msgs.length - lastMsgCountRef.current)); }
                        lastMsgCountRef.current = msgs.length;

                        // Log
                        setRoomLog(data.log || []);

                        // Players
                        let playersData = data.players || {};
                        let currentPlayers = Array.isArray(playersData) ? playersData : Object.values(playersData);

                        const amIIn = currentPlayers.find(p => p.id === user.uid);

                        if (!amIIn) {
                            // FIX: Check if we are currently in the process of joining
                            if (isJoiningRef.current) {
                                // Ignore this snapshot, wait for the transaction to propagate
                                return;
                            }

                            // If I'm not in the list and not joining, I was kicked.
                            setJoinedRoom(null);
                            setError("You have left the room.");
                        } else {
                            // We are present, clear the joining flag
                            isJoiningRef.current = false;
                            setPlayers(currentPlayers);
                            playersRef.current = currentPlayers; // Update Ref for heartbeat
                        }
                    } else {
                        setError('Room does not exist!'); setJoinedRoom(null);
                    }
                }, (err) => setError(err.message));
                return () => unsubscribe();
            }, [joinedRoom, user, showChat]);

            useEffect(() => {
                if (showChat && chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                    setUnreadCount(0);
                }
            }, [showChat, messages]);

            const updateSelf = async (updates) => {
                if (!joinedRoom) return;
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', joinedRoom);

                // Optimistic update
                const currentList = playersRef.current;
                const newPlayers = currentList.map(p => p.id === user.uid ? { ...p, ...updates } : p);
                setPlayers(newPlayers);
                playersRef.current = newPlayers;

                // Atomic Update
                const updatePayload = {};
                Object.entries(updates).forEach(([key, val]) => {
                    updatePayload[`players.${user.uid}.${key}`] = val;
                });
                updatePayload.lastActivity = serverTimestamp();

                await updateDoc(roomRef, updatePayload);
                if (updates.commander && joinedRoom !== "Test") updateCommanderStat(updates.commander);
                if (updates.partner && joinedRoom !== "Test") updateCommanderStat(updates.partner);
            };

            const winnerId = (activePlayers.length === 1 && players.length > 1) ? activePlayers[0].id : null;

                if (winnerId !== lastWinnerRef.current) {

                    incrementUserStats(winnerId, { wins: 1, gamesPlayed: 1 });
